<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DarkThrone Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .badge { display: inline-block; padding: 2px 7px; border-radius: 9999px; font-size: 11px; font-weight: 600; margin-right: 3px; }
        .badge-bot    { background: #7c3aed; color: #fff; }
        .badge-clan   { background: #0369a1; color: #fff; }
        .badge-friend { background: #065f46; color: #fff; }
        .badge-hit    { background: #991b1b; color: #fff; }
        .badge-range  { background: #854d0e; color: #fff; }

        /* Filter tabs */
        .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
        .ftab {
            padding: 5px 14px; border-radius: 9999px; font-size: 12px; font-weight: 600;
            cursor: pointer; border: 1px solid #334155; background: #1e293b; color: #94a3b8;
            transition: all .15s;
        }
        .ftab:hover { border-color: #64748b; color: #f1f5f9; }
        .ftab.active { background: #0f4c81; border-color: #3b82f6; color: #93c5fd; }
        .ftab.active.tab-all    { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
        .ftab.active.tab-range  { background: #4a2c0a; border-color: #f59e0b; color: #fcd34d; }
        .ftab.active.tab-bot    { background: #2e1065; border-color: #a855f7; color: #d8b4fe; }
        .ftab.active.tab-friend { background: #052e16; border-color: #22c55e; color: #86efac; }
        .ftab.active.tab-clan   { background: #0c2340; border-color: #0ea5e9; color: #7dd3fc; }
        .ftab.active.tab-hit    { background: #450a0a; border-color: #ef4444; color: #fca5a5; }

        /* Table */
        table { border-collapse: collapse; width: 100%; }
        thead th {
            background: #0f172a; padding: 9px 12px; text-align: left;
            font-size: 11px; color: #64748b; text-transform: uppercase;
            letter-spacing: .06em; white-space: nowrap; user-select: none;
        }
        thead th.sortable { cursor: pointer; }
        thead th.sortable:hover { color: #94a3b8; }
        thead th.sort-asc::after  { content: ' ↑'; color: #38bdf8; }
        thead th.sort-desc::after { content: ' ↓'; color: #38bdf8; }
        tbody td { padding: 7px 12px; border-bottom: 1px solid #0f172a; font-size: 13px; }
        tbody tr { cursor: pointer; }
        tbody tr:hover td { background: #1e3a5f22; }
        tbody tr.selected td { background: #0f4c8133; }

        /* Fort bar */
        .fort-bar-wrap { display: flex; align-items: center; gap: 6px; }
        .fort-bar-track { width: 56px; height: 5px; background: #334155; border-radius: 3px; }
        .fort-bar-fill  { height: 100%; border-radius: 3px; }
    </style>
</head>
<body class="p-6">
<div class="max-w-7xl mx-auto">

    <!-- Header -->
    <div class="flex justify-between items-start mb-6">
        <div>
            <h1 class="text-3xl font-bold text-emerald-400">🛡️ DarkThrone Intelligence</h1>
            <p class="text-slate-500 text-sm mt-1">
                Updated: <span id="last-updated">-</span>
                &nbsp;|&nbsp; Refresh in: <span id="countdown" class="text-emerald-400 font-mono font-bold">-</span>
            </p>
        </div>
        <div class="flex gap-3 items-center">
            <input id="searchBox" type="text" placeholder="Search player..."
                class="bg-slate-800 border border-slate-700 p-2 rounded w-44 text-sm"
                oninput="onSearch(this.value)">
            <select id="playerFilter" class="bg-slate-800 border border-slate-700 p-2 rounded w-52 text-sm"
                onchange="selectPlayer(this.value)">
                <option value="">— Select a Player —</option>
            </select>
        </div>
    </div>

    <!-- Selected player stat cards -->
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-4">
        <div class="card p-4 text-center">
            <p class="text-slate-400 text-xs mb-1">Target</p>
            <p id="stat-name" class="text-base font-bold text-emerald-400 truncate">—</p>
        </div>
        <div class="card p-4 text-center">
            <p class="text-slate-400 text-xs mb-1">Level / Race</p>
            <p id="stat-level" class="text-base font-bold">—</p>
        </div>
        <div class="card p-4 text-center">
            <p class="text-slate-400 text-xs mb-1">Peak Gold</p>
            <p id="stat-peak" class="text-base font-bold text-yellow-400">0</p>
        </div>
        <div class="card p-4 text-center">
            <p class="text-slate-400 text-xs mb-1">Gold Δ / Scrape</p>
            <p id="stat-avg" class="text-base font-bold text-blue-400">0</p>
        </div>
        <div class="card p-4 text-center">
            <p class="text-slate-400 text-xs mb-1">Scrapes</p>
            <p id="stat-scrapes" class="text-base font-bold">0</p>
        </div>
    </div>
    <div id="badge-row" class="mb-5 flex gap-2 flex-wrap min-h-5"></div>

    <!-- Charts -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
        <div class="card p-4">
            <p class="text-xs font-semibold text-slate-400 mb-2">Gold over time</p>
            <canvas id="goldChart" height="140"></canvas>
        </div>
        <div class="card p-4">
            <p class="text-xs font-semibold text-slate-400 mb-2">Fort HP over time</p>
            <canvas id="fortChart" height="140"></canvas>
        </div>
    </div>

    <!-- Player table -->
    <div class="card p-4">
        <div class="flex justify-between items-center mb-3 flex-wrap gap-3">
            <div class="filter-tabs">
                <span class="ftab tab-all active"   onclick="setFilter('all')"   >All Players</span>
                <span class="ftab tab-range"         onclick="setFilter('range')" >In Range</span>
                <span class="ftab tab-friend"        onclick="setFilter('friend')">Friends</span>
                <span class="ftab tab-clan"          onclick="setFilter('clan')"  >Clan</span>
                <span class="ftab tab-hit"           onclick="setFilter('hit')"   >Hit List</span>
                <span class="ftab tab-bot"           onclick="setFilter('bot')"   >Bots</span>
            </div>
            <span id="row-count" class="text-xs text-slate-500"></span>
        </div>
        <div class="overflow-x-auto">
            <table>
                <thead>
                    <tr>
                        <th class="sortable" onclick="sortBy('name')">Player</th>
                        <th class="sortable" onclick="sortBy('level')">Level</th>
                        <th class="sortable" onclick="sortBy('race')">Race</th>
                        <th class="sortable sort-desc" id="th-gold" onclick="sortBy('gold')">Gold</th>
                        <th class="sortable" onclick="sortBy('gold_change')">Gold Δ</th>
                        <th class="sortable" onclick="sortBy('hp')">Fort HP</th>
                        <th class="sortable" onclick="sortBy('hp_max')">Fort Max</th>
                        <th class="sortable" onclick="sortBy('fort_pct')">Fort %</th>
                        <th>Tags</th>
                        <th class="sortable" onclick="sortBy('scrapes')">Scrapes</th>
                    </tr>
                </thead>
                <tbody id="playersBody"></tbody>
            </table>
        </div>
    </div>

</div>

: 100, "fort_pct": 100, "turns": 0, "in_range": true, "is_bot": false, "is_clan": false, "is_friend": false, "is_hitlist": false}, {"timestamp": "2026-04-07 05:01", "player_id": "293", "level": 1, "race": "elf", "gold": 23660, "hp": 100, "hp_max": 100, "fort_pct": 100, "turns": 0, "in_range": true, "is_bot": false, "is_clan": false, "is_friend": false, "is_hitlist": false}, {"timestamp": "2026-04-07 05:30", "player_id": "293", "level": 1, "race": "elf", "gold": 27195, "hp": 100, "hp_max": 100, "fort_pct": 100, "turns": 0, "in_range": true, "is_bot": false, "is_clan": false, "is_friend": false, "is_hitlist": false}, {"timestamp": "2026-04-07 06:00", "player_id": "293", "level": 1, "race": "elf", "gold": 30730, "hp": 100, "hp_max": 100, "fort_pct": 100, "turns": 0, "in_range": true, "is_bot": false, "is_clan": false, "is_friend": false, "is_hitlist": false}]};

// ── State ────────────────────────────────────────────────────────────────────
let goldChart, fortChart;
let currentFilter  = 'all';
let sortCol        = 'gold';
let sortDir        = -1;   // -1 = desc, 1 = asc
let searchQuery    = '';
let selectedPlayer = '';

document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();

// ── Build player index ────────────────────────────────────────────────────────
const playerNames = Object.keys(rawData).sort();

// Populate dropdown
const sel = document.getElementById('playerFilter');
playerNames.forEach(n => {
    const o = document.createElement('option');
    o.value = o.textContent = n;
    sel.appendChild(o);
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function latest(name) { const d = rawData[name]; return d[d.length - 1]; }

function goldChange(name) {
    const d = rawData[name];
    return d.length > 1 ? d[d.length - 1].gold - d[d.length - 2].gold : 0;
}

function passesFilter(name) {
    const l = latest(name);
    if (currentFilter === 'range')  return l.in_range;
    if (currentFilter === 'friend') return l.is_friend;
    if (currentFilter === 'clan')   return l.is_clan;
    if (currentFilter === 'hit')    return l.is_hitlist;
    if (currentFilter === 'bot')    return l.is_bot;
    return true;
}

function passesSearch(name) {
    return !searchQuery || name.toLowerCase().includes(searchQuery);
}

function getSortValue(name) {
    const l = latest(name);
    if (sortCol === 'name')        return name.toLowerCase();
    if (sortCol === 'level')       return l.level;
    if (sortCol === 'race')        return l.race;
    if (sortCol === 'gold')        return l.gold;
    if (sortCol === 'gold_change') return goldChange(name);
    if (sortCol === 'hp')          return l.hp;
    if (sortCol === 'hp_max')      return l.hp_max;
    if (sortCol === 'fort_pct')    return l.fort_pct;
    if (sortCol === 'scrapes')     return rawData[name].length;
    return 0;
}

// ── Render table ──────────────────────────────────────────────────────────────
function buildTable() {
    const visible = playerNames
        .filter(n => passesFilter(n) && passesSearch(n))
        .sort((a, b) => {
            const va = getSortValue(a), vb = getSortValue(b);
            if (typeof va === 'string') return sortDir * va.localeCompare(vb);
            return sortDir * (vb - va);
        });

    document.getElementById('row-count').textContent =
        `${visible.length} player${visible.length !== 1 ? 's' : ''}`;

    const tbody = document.getElementById('playersBody');
    tbody.innerHTML = '';

    visible.forEach(name => {
        const l  = latest(name);
        const gc = goldChange(name);
        const gcColor = gc > 0 ? '#10b981' : gc < 0 ? '#ef4444' : '#64748b';
        const gcStr   = (gc > 0 ? '+' : '') + gc.toLocaleString();

        const fortColor = l.fort_pct >= 75 ? '#10b981' : l.fort_pct >= 40 ? '#f59e0b' : '#ef4444';
        const fortBarW  = Math.max(2, l.fort_pct);

        const tags = [
            l.is_bot     ? '<span class="badge badge-bot">BOT</span>'       : '',
            l.is_clan    ? '<span class="badge badge-clan">CLAN</span>'     : '',
            l.is_friend  ? '<span class="badge badge-friend">FRIEND</span>' : '',
            l.is_hitlist ? '<span class="badge badge-hit">🎯 HIT</span>'   : '',
            l.in_range   ? '<span class="badge badge-range">RANGE</span>'  : '',
        ].join('');

        const tr = document.createElement('tr');
        if (name === selectedPlayer) tr.classList.add('selected');
        tr.onclick = () => clickRow(name, tr);
        tr.innerHTML = `
            <td class="font-medium text-slate-200">${name}</td>
            <td>${l.level}</td>
            <td class="capitalize text-slate-400">${l.race}</td>
            <td class="font-mono">${l.gold.toLocaleString()}</td>
            <td class="font-mono text-xs" style="color:${gcColor}">${gcStr}</td>
            <td>${l.hp.toLocaleString()}</td>
            <td>${l.hp_max.toLocaleString()}</td>
            <td>
              <div class="fort-bar-wrap">
                <div class="fort-bar-track">
                  <div class="fort-bar-fill" style="width:${fortBarW}%;background:${fortColor}"></div>
                </div>
                <span style="color:${fortColor};font-size:11px">${l.fort_pct}%</span>
              </div>
            </td>
            <td>${tags}</td>
            <td class="text-slate-500">${rawData[name].length}</td>`;
        tbody.appendChild(tr);
    });
}

// ── Sort ──────────────────────────────────────────────────────────────────────
function sortBy(col) {
    if (sortCol === col) {
        sortDir *= -1;
    } else {
        sortCol = col;
        sortDir = col === 'name' || col === 'race' ? 1 : -1;
    }
    // Update header indicators
    document.querySelectorAll('thead th').forEach(th => {
        th.classList.remove('sort-asc','sort-desc');
    });
    const thMap = {
        name:'th-name', level:'th-level', race:'th-race', gold:'th-gold',
        gold_change:'th-gold-change', hp:'th-hp', hp_max:'th-hp-max',
        fort_pct:'th-fort', scrapes:'th-scrapes'
    };
    const thEl = document.getElementById(thMap[col] || 'th-gold');
    if (thEl) thEl.classList.add(sortDir === -1 ? 'sort-desc' : 'sort-asc');
    buildTable();
}

// Give each th an id for the sort indicator
document.querySelectorAll('thead th').forEach((th, i) => {
    const ids = ['th-name','th-level','th-race','th-gold','th-gold-change',
                 'th-hp','th-hp-max','th-fort','th-tags','th-scrapes'];
    if (!th.id) th.id = ids[i] || '';
});

// ── Filter tabs ───────────────────────────────────────────────────────────────
function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab-${f === 'all' ? 'all' : f}`).classList.add('active');
    buildTable();
}

// ── Search ────────────────────────────────────────────────────────────────────
function onSearch(val) {
    searchQuery = val.toLowerCase();
    buildTable();
}

// ── Row click → chart ─────────────────────────────────────────────────────────
function clickRow(name, tr) {
    document.querySelectorAll('tbody tr.selected').forEach(r => r.classList.remove('selected'));
    tr.classList.add('selected');
    sel.value = name;
    selectPlayer(name);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Player detail charts ──────────────────────────────────────────────────────
function selectPlayer(name) {
    if (!name || !rawData[name]) return;
    selectedPlayer = name;
    localStorage.setItem('dt_selected_player', name);
    const data  = rawData[name];
    const times = data.map(d => d.timestamp);
    const golds = data.map(d => d.gold);
    const hps   = data.map(d => d.hp);
    const l     = latest(name);

    document.getElementById('stat-name').textContent   = name;
    document.getElementById('stat-level').textContent  = `Lvl ${l.level} ${l.race}`;
    document.getElementById('stat-peak').textContent   = Math.max(...golds).toLocaleString();
    document.getElementById('stat-scrapes').textContent = data.length;

    const avg = data.length > 1
        ? Math.round((golds[golds.length - 1] - golds[0]) / (golds.length - 1)) : 0;
    const avgEl = document.getElementById('stat-avg');
    avgEl.textContent = (avg >= 0 ? '+' : '') + avg.toLocaleString();
    avgEl.style.color = avg >= 0 ? '#60a5fa' : '#f87171';

    document.getElementById('badge-row').innerHTML = [
        l.is_bot     ? '<span class="badge badge-bot">BOT</span>'           : '',
        l.is_clan    ? '<span class="badge badge-clan">CLAN MEMBER</span>'  : '',
        l.is_friend  ? '<span class="badge badge-friend">FRIEND</span>'     : '',
        l.is_hitlist ? '<span class="badge badge-hit">🎯 ON HIT LIST</span>': '',
        l.in_range   ? '<span class="badge badge-range">IN YOUR RANGE</span>': '',
    ].join('');

    const cOpts = (label, color) => ({
        type: 'line',
        options: {
            responsive: true,
            plugins: { legend: { labels: { color: '#f1f5f9', font: { size: 10 } } } },
            scales: {
                x: { ticks: { color: '#475569', maxTicksLimit: 6, font: { size: 9 } }, grid: { color: '#1e293b' } },
                y: { ticks: { color: '#475569' }, grid: { color: '#334155' },
                     title: { display: true, text: label, color: '#94a3b8', font: { size: 10 } } }
            }
        }
    });

    if (goldChart) goldChart.destroy();
    goldChart = new Chart(document.getElementById('goldChart'), {
        ...cOpts('Gold', '#10b981'),
        data: { labels: times, datasets: [{
            label: 'Gold', data: golds,
            borderColor: '#10b981', backgroundColor: '#10b98118',
            tension: 0.3, fill: true, pointRadius: 3
        }]}
    });

    if (fortChart) fortChart.destroy();
    fortChart = new Chart(document.getElementById('fortChart'), {
        ...cOpts('Fort HP', '#ef4444'),
        data: { labels: times, datasets: [
            { label: 'Fort HP', data: hps, borderColor: '#ef4444', backgroundColor: '#ef444418', tension: 0.3, fill: true, pointRadius: 3 },
            { label: 'Max HP',  data: data.map(d => d.hp_max), borderColor: '#475569', borderDash: [4,4], tension: 0.3, fill: false, pointRadius: 0 }
        ]}
    });
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildTable();   // default: sorted by gold desc, all players

const saved = localStorage.getItem('dt_selected_player');
const first = (saved && rawData[saved]) ? saved : playerNames[0];
if (first) { sel.value = first; selectPlayer(first); }

// ── Auto-refresh ──────────────────────────────────────────────────────────────
function msUntilNextHalf() {
    const n = new Date();
    return ((30 * 60) - (n.getMinutes() % 30) * 60 - n.getSeconds()) * 1000;
}
(function countdown() {
    let rem = Math.floor(msUntilNextHalf() / 1000);
    const el = document.getElementById('countdown');
    const iv = setInterval(() => {
        rem--;
        const m = String(Math.floor(rem / 60)).padStart(2,'0');
        const s = String(rem % 60).padStart(2,'0');
        el.textContent = `${m}:${s}`;
        if (rem <= 0) { clearInterval(iv); el.textContent = 'Refreshing…'; location.reload(); }
    }, 1000);
})();
</script>
